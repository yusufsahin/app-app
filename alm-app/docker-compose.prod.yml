# Production: from alm-app directory
#   docker compose -f docker-compose.prod.yml --env-file .env up --build -d
# Build context must include folder alm-manifest-app (see DEPLOY.md). Harici nginx için
# .env içinde ör: ALM_FRONTEND_PORT_MAPPING=127.0.0.1:9081:80
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${ALM_POSTGRES_USER:-alm}
      POSTGRES_PASSWORD: ${ALM_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ALM_POSTGRES_DB:-alm}
    volumes:
      - alm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${ALM_POSTGRES_USER:-alm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alm_internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alm_internal

  backend:
    build:
      context: ${ALM_DOCKER_CONTEXT:-../..}
      dockerfile: alm-manifest-app/alm-app/backend/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      ALM_ENVIRONMENT: "production"
      ALM_DEBUG: "false"
      ALM_DATABASE_URL: "postgresql+asyncpg://${ALM_POSTGRES_USER:-alm}:${ALM_POSTGRES_PASSWORD}@db:5432/${ALM_POSTGRES_DB:-alm}"
      ALM_REDIS_URL: "redis://redis:6379/0"
      ALM_JWT_SECRET_KEY: ${ALM_JWT_SECRET_KEY}
      ALM_SEED_DEMO_DATA: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/liveness')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - alm_internal
      - alm_public

  frontend:
    build:
      context: ${ALM_DOCKER_CONTEXT:-../..}
      dockerfile: alm-manifest-app/alm-app/frontend/Dockerfile
    restart: always
    ports:
      - "${ALM_FRONTEND_PORT_MAPPING:-80:80}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alm_public

networks:
  alm_internal:
    internal: true
  alm_public:

volumes:
  alm_pgdata:
