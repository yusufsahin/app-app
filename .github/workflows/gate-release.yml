name: Gate Release

on:
  workflow_dispatch:

jobs:
  gate-release:
    runs-on: ubuntu-latest
    env:
      GATE_TIER: release
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alm
          POSTGRES_PASSWORD: alm_ci_password
          POSTGRES_DB: alm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Backend install
        working-directory: alm-app/backend
        run: uv sync --extra dev

      - name: Backend lint (ruff)
        working-directory: alm-app/backend
        run: uv run python scripts/lint_src.py

      - name: Backend lint tests (ruff +TRY+PTH)
        working-directory: alm-app/backend
        run: uv run python scripts/lint_tests.py

      - name: Preflight gate (includes flaky quarantine for release)
        working-directory: alm-app/backend
        run: uv run python scripts/risk_gate.py --phase preflight

      - name: Prepare artifacts directory
        working-directory: alm-app/backend
        run: mkdir -p artifacts

      - name: Backend test (pytest)
        continue-on-error: true
        working-directory: alm-app/backend
        env:
          ALM_DATABASE_URL: postgresql+asyncpg://alm:alm_ci_password@localhost:5432/alm
          ALM_TEST_DATABASE_URL: postgresql+asyncpg://alm:alm_ci_password@localhost:5432/alm
          ALM_REDIS_URL: redis://localhost:6379/0
          ALM_JWT_SECRET_KEY: ci-secret-key-for-tests
        run: uv run pytest tests -v --tb=short --ignore=tests/e2e --junitxml artifacts/pytest-report.xml

      - name: Posttest gate
        if: always()
        working-directory: alm-app/backend
        run: uv run python scripts/risk_gate.py --phase posttest

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-release-artifacts
          path: alm-app/backend/artifacts/
          if-no-files-found: warn
          retention-days: 30
